<!-- valkyria-frontend-develop/src/app/features/artists/artists.html -->
<div class="min-h-screen text-white pt-24 pb-20 px-4 md:px-8">
  <div class="max-w-7xl mx-auto">

    <header class="mb-12 md:mb-16">
      <h1 i18n="@@artists.title" class="text-4xl md:text-8xl font-black uppercase tracking-tighter mb-8 md:mb-12 text-center">
        Artistas
      </h1>

      <!-- Buscador Optimizado -->
      <div class="max-w-2xl mx-auto relative group">
        <input
          type="text"
          (input)="updateSearch($event)"
          i18n-placeholder="@@artists.search.placeholder"
          placeholder="BUSCAR ARTISTA..."
          class="w-full bg-transparent border-b-2 border-white/10 py-4 md:py-6 px-2 text-xl md:text-3xl font-bold uppercase tracking-widest focus:outline-none focus:border-red-600 transition-all duration-300 placeholder:text-white/20"
        >
        <!-- Contador de resultados: Ajustado para no solapar en móvil -->
        <span i18n="@@artists.search.total"
              class="block md:absolute md:right-4 md:top-1/2 md:-translate-y-1/2 text-white/40 font-mono text-[10px] mt-2 md:mt-0 tracking-widest">
          {{ totalElements() }} TOTAL
        </span>
      </div>
    </header>

    @if (isLoading() && artists().length === 0) {
      <div class="flex flex-col items-center justify-center py-32">
        <div class="w-10 h-10 border-2 border-white/5 border-t-red-600 rounded-full animate-spin mb-6"></div>
        <p i18n="@@artists.loading" class="text-[10px] uppercase tracking-[0.4em] text-white/40 animate-pulse">
          Cargando Artistas...
        </p>
      </div>
    } @else {
      <!-- Grid de Artistas: 1 col móvil, 2 col tablet, 3 col desktop -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 mb-20">
        @for (artist of artists(); track artist.id) {
          <app-artist-card [artist]="artist" class="animate-in fade-in slide-in-from-bottom-4 duration-500"/>
        } @empty {
          <div i18n="@@artists.empty" class="col-span-full text-center py-20 text-white/40 italic font-mono text-sm">
            No se han encontrado artistas con ese nombre.
          </div>
        }
      </div>

      <!-- Botón Cargar Más: Ancho completo en móvil -->
      @if (hasMore()) {
        <div class="flex justify-center">
          <button
            (click)="loadMore()"
            [disabled]="isLoading()"
            class="w-full md:w-auto group relative px-12 py-5 bg-white text-black font-black uppercase tracking-[0.2em] text-xs hover:bg-red-600 hover:text-white transition-all duration-300 cursor-pointer disabled:opacity-50">

            @if (isLoading()) {
              <span i18n="@@artists.loading.more">CARGANDO...</span>
            } @else {
              <span i18n="@@artists.loadMore.btn">CARGAR MÁS ARTISTAS</span>
              <span i18n="@@artists.loadMore.showing" class="block text-[9px] font-mono mt-1 opacity-50">
                MOSTRANDO {{ artists().length }} DE {{ totalElements() }}
              </span>
            }
          </button>
        </div>
      }
    }

  </div>
</div>
