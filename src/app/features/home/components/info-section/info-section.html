<section class="relative text-white py-16 md:py-24 overflow-hidden">
  <!-- Marca de agua de fondo -->
  <div class="absolute inset-0 flex justify-center items-center opacity-[0.12] z-0 pointer-events-none select-none">
    <span class="font-cinzel-decorative text-[30vw] md:text-[25vw] font-black leading-none tracking-tighter uppercase" style="color: rgba(220, 38, 38, 0.3);">
      VALKYRIA
    </span>
  </div>

  <div class="relative z-10 max-w-7xl mx-auto px-6">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-10 md:gap-4 lg:gap-8 text-center items-center">

      <!-- Lugar -->
      <div class="flex flex-col items-center group animate-in" style="animation-delay: 0.1s">
        <h3 class="text-4xl sm:text-6xl lg:text-8xl font-black uppercase tracking-tighter mb-3 md:mb-4 italic transition-all group-hover:scale-110 group-hover:text-red-600 duration-500 drop-shadow-[0_0_15px_rgba(220,38,38,0.5)]">
          {{ 'home.info.location_value' | translate }}
        </h3>
        <div class="w-10 md:w-12 h-1 bg-linear-to-r from-red-600 to-red-800 mb-4 transition-all group-hover:w-24 group-hover:shadow-[0_0_10px_rgba(220,38,38,0.8)]"></div>
        <p class="font-bebas text-xs md:text-sm uppercase tracking-[0.5em] text-gray-400 group-hover:text-gray-300 transition-colors">
          {{ 'home.info.location_label' | translate }}
        </p>
      </div>

      <!-- Duración -->
      <div class="flex flex-col items-center group animate-in border-y md:border-y-0 md:border-x border-red-900/20 py-10 md:py-0" style="animation-delay: 0.2s">
        <h3 class="text-4xl sm:text-6xl lg:text-8xl font-black uppercase tracking-tighter mb-3 md:mb-4 italic transition-all group-hover:scale-110 group-hover:text-red-600 duration-500 drop-shadow-[0_0_15px_rgba(220,38,38,0.5)]">
          {{ 'home.info.duration_value' | translate }}
        </h3>
        <div class="w-10 md:w-12 h-1 bg-linear-to-r from-red-600 to-red-800 mb-4 transition-all group-hover:w-24 group-hover:shadow-[0_0_10px_rgba(220,38,38,0.8)]"></div>
        <p class="font-bebas text-xs md:text-sm uppercase tracking-[0.5em] text-gray-400 group-hover:text-gray-300 transition-colors">
          {{ 'home.info.duration_label' | translate }}
        </p>
      </div>

      <!-- Conteo Artistas -->
      <div class="flex flex-col items-center group animate-in" style="animation-delay: 0.3s">
        <h3 class="text-4xl sm:text-6xl lg:text-8xl font-black uppercase tracking-tighter mb-3 md:mb-4 italic transition-all group-hover:scale-110 group-hover:text-red-600 duration-500 drop-shadow-[0_0_15px_rgba(220,38,38,0.5)]">
          {{ 'home.info.artists_count' | translate }}
        </h3>
        <div class="w-10 md:w-12 h-1 bg-linear-to-r from-red-600 to-red-800 mb-4 transition-all group-hover:w-24 group-hover:shadow-[0_0_10px_rgba(220,38,38,0.8)]"></div>
        <p class="font-bebas text-xs md:text-sm uppercase tracking-[0.5em] text-gray-400 group-hover:text-gray-300 transition-colors">
          {{ 'home.info.artists_label' | translate }}
        </p>
      </div>

    </div>
  </div>
</section>
