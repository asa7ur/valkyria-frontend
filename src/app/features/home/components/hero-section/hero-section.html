<section class="relative h-screen w-full flex flex-col justify-center items-center overflow-hidden">
  <video
    #heroVideo
    autoplay
    muted
    loop
    playsinline
    class="absolute z-0 w-auto min-w-full min-h-full max-w-none object-cover mask-[linear-gradient(to_bottom,black_80%,transparent_100%)] animate-video">
    <source
      src="https://fra1.digitaloceanspaces.com/hellfest-bucket/intro_2026_ebde32b292.mp4"
      type="video/mp4">
    <span>{{ 'home.hero.video_fallback' | translate }}</span>
  </video>

  <div class="absolute inset-0 z-1 bg-linear-to-b from-black/40 via-transparent via-70% to-black"></div>

  <div class="relative z-10 text-center text-white px-6">
    <p class="font-bebas text-sm md:text-xl tracking-[0.4em] md:tracking-[0.5em] mb-4 uppercase opacity-90">
      {{ 'home.hero.date' | translate }}
    </p>
    <h1 class="font-cinzel-decorative text-5xl md:text-9xl font-black tracking-tight uppercase mb-10 leading-none">
      {{ 'home.hero.title' | translate }}
    </h1>
    <button
      [routerLink]="['/purchase']"
      class="font-bebas bg-red-600 hover:bg-white hover:text-black text-white px-8 py-4 md:px-12 md:py-5 text-sm md:text-base uppercase tracking-[0.4em] transition-all duration-300 transform hover:scale-105 active:scale-95 shadow-2xl cursor-pointer">
      {{ 'home.hero.buy_tickets' | translate }}
    </button>
  </div>
</section>
