<section class="text-white py-16 md:py-24 overflow-hidden">
  <div class="px-4 md:px-6">
    <div class="max-w-7xl mx-auto">
      <div class="flex items-center gap-4 mb-8 md:mb-12">
        <h2 class="text-[10px] md:text-sm uppercase tracking-[0.5em] text-gray-500 whitespace-nowrap">
          {{ 'home.experience.title' | translate }}
        </h2>
        <div class="h-px w-full bg-white/10"></div>
      </div>
    </div>
  </div>

  <div class="relative w-full h-[45vh] md:h-[80vh]">
    <div class="absolute inset-0 flex transition-transform duration-1000 ease-in-out"
         [style.transform]="'translateX(-' + (currentIndex() * 100) + '%)'">

      @for (image of images(); track image) {
        <div class="min-w-full h-full">
          <img [src]="image"
               class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700"
               [alt]="'home.experience.img_alt' | translate">
        </div>
      }
    </div>
  </div>
</section>
