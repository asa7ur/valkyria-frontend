<div class="min-h-screen bg-black flex items-center justify-center px-6 relative overflow-hidden">

  <div class="absolute top-0 left-0 w-full h-full opacity-20 pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-red-600 blur-[120px] rounded-full"></div>
  </div>

  <div class="w-full max-w-md z-10">
    <div class="mb-12">
      <h2 [innerHTML]="'login.title' | translate"
          class="text-6xl font-black text-white uppercase italic leading-none">
      </h2>
      <div class="h-2 w-24 bg-red-600 mt-4"></div>
    </div>

    @if (errorMessage()) {
      <div class="bg-red-600/20 border border-red-600 text-red-500 p-4 mb-6 text-xs font-bold uppercase tracking-widest">
        {{ errorMessage() }}
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-8">
      <div class="relative group">
        <label class="block text-[10px] font-black uppercase tracking-[0.3em] text-white/40 mb-2 group-focus-within:text-red-500 transition-colors">
          {{ 'login.labels.username' | translate }}
        </label>
        <input
          type="text"
          formControlName="username"
          [placeholder]="'login.placeholders.username' | translate"
          class="w-full bg-transparent border-b-2 border-white/10 py-3 text-white placeholder:text-white/10 focus:outline-none focus:border-red-600 transition-all font-bold"
        >
      </div>

      <div class="relative group">
        <label class="block text-[10px] font-black uppercase tracking-[0.3em] text-white/40 mb-2 group-focus-within:text-red-500 transition-colors">
          {{ 'login.labels.password' | translate }}
        </label>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="w-full bg-transparent border-b-2 border-white/10 py-3 text-white placeholder:text-white/10 focus:outline-none focus:border-red-600 transition-all font-bold"
        >
      </div>

      <div class="pt-4">
        <button
          type="submit"
          [disabled]="loginForm.invalid || isLoading()"
          class="w-full bg-white text-black py-5 text-sm font-black uppercase tracking-[0.2em] hover:bg-red-600 hover:text-white disabled:opacity-30 disabled:hover:bg-white disabled:hover:text-black transition-all cursor-pointer flex justify-between items-center px-8 group"
        >
          <span>
            @if (isLoading()) {
              {{ 'login.btn.authenticating' | translate }}
            } @else {
              {{ 'login.btn.submit' | translate }}
            }
          </span>

          @if (!isLoading()) {
            <svg xmlns="http://www.w3.org/2000/svg"
                 class="h-5 w-5 transform group-hover:translate-x-2 transition-transform" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
            </svg>
          }
        </button>
      </div>
    </form>

    <div class="mt-8">
      <div class="flex items-center gap-4 mb-6">
        <div class="flex-1 h-px bg-white/10"></div>
        <span class="text-white/20 text-[10px] font-bold uppercase tracking-widest">{{ 'login.text.or' | translate }}</span>
        <div class="flex-1 h-px bg-white/10"></div>
      </div>

      <button type="button" (click)="loginWithGoogle()"
         class="w-full bg-transparent border border-white/20 text-white py-4 text-sm font-bold uppercase tracking-[0.15em] hover:border-white/60 hover:bg-white/5 transition-all flex items-center justify-center gap-4 px-8 cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="w-5 h-5 shrink-0">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        {{ 'login.btn.google' | translate }}
      </button>
    </div>

    <div class="mt-8 flex justify-between items-center text-[10px] font-bold uppercase tracking-widest">
      <a routerLink="/" class="text-white/30 hover:text-white transition-colors">
        ← {{ 'login.links.back_home' | translate }}
      </a>
      <div class="flex gap-4">
        <span class="text-white/20">{{ 'login.text.new_here' | translate }}</span>
        <a routerLink="/register" class="text-red-500 hover:text-white transition-colors">
          {{ 'login.links.register' | translate }} →
        </a>
      </div>
    </div>
  </div>
</div>
