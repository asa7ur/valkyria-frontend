<div class="min-h-screen flex flex-col items-center justify-start pt-24 pb-12 px-6 md:pt-32 lg:pt-40">

  <div class="max-w-xl w-full text-center space-y-6 md:space-y-8 animate-in fade-in zoom-in duration-500">

    <div class="flex justify-center">
      <div
        class="w-20 h-20 md:w-24 md:h-24 bg-red-600 rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(220,38,38,0.4)]">
        <i class="bi bi-check-lg text-white text-5xl md:text-6xl"></i>
      </div>
    </div>

    <div class="space-y-3">
      <h1 class="text-5xl md:text-7xl font-black text-white uppercase italic tracking-tighter leading-none">
        {{ 'purchase.success.title' | translate }}
      </h1>
      <p class="font-bebas text-red-600 text-base md:text-lg uppercase tracking-[0.3em] md:tracking-[0.4em]">
        {{ 'purchase.success.subtitle' | translate }}
      </p>
    </div>

    <div class="bg-zinc-900/80 border border-white/10 p-6 md:p-10 space-y-6">
      <p class="text-white/70 text-base md:text-lg leading-relaxed">
        {{ 'purchase.success.description' | translate }}
      </p>

      <div class="pt-2 flex flex-col">
        <a routerLink="/"
           class="font-bebas bg-white text-black py-4 px-6 text-lg md:text-xl uppercase tracking-widest hover:bg-red-600 hover:text-white transition-all transform active:scale-95">
          {{ 'purchase.success.homeBtn' | translate }}
        </a>
      </div>
    </div>

    <p class="font-bebas text-white/20 text-sm uppercase tracking-widest">
      {{ 'purchase.success.footerText' | translate }}
    </p>
  </div>
</div>
