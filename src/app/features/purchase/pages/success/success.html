<div class="min-h-screen flex flex-col items-center justify-start pt-24 pb-12 px-6 md:pt-32 lg:pt-40">

  <div class="max-w-xl w-full text-center space-y-6 md:space-y-8 animate-in fade-in zoom-in duration-500">

    <div class="flex justify-center">
      <div
        class="w-20 h-20 md:w-24 md:h-24 bg-red-600 rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(220,38,38,0.4)]">
        <i class="bi bi-check-lg text-white text-5xl md:text-6xl"></i>
      </div>
    </div>

    <div class="space-y-3">
      <h1 i18n="@@purchase.success.title"
          class="text-5xl md:text-7xl font-black text-white uppercase italic tracking-tighter leading-none">
        ¡Victoria!
      </h1>
      <p i18n="@@purchase.success.subtitle"
         class="text-red-600 text-sm md:text-base font-bold uppercase tracking-[0.2em] md:tracking-[0.3em]">
        Pago procesado correctamente
      </p>
    </div>

    <div class="bg-zinc-900/80 border border-white/10 p-6 md:p-10 space-y-6">
      <p i18n="@@purchase.success.description" class="text-white/70 text-base md:text-lg leading-relaxed">
        Tus entradas han sido reservadas. Recibirás un correo electrónico con los detalles del pedido y tus códigos de
        acceso al festival.
      </p>

      <div class="pt-2 flex flex-col">
        <a routerLink="/"
           i18n="@@purchase.success.homeBtn"
           class="bg-white text-black py-4 px-6 text-base md:text-lg font-black uppercase tracking-widest hover:bg-red-600 hover:text-white transition-all transform active:scale-95">
          Volver al Inicio
        </a>
      </div>
    </div>

    <p i18n="@@purchase.success.footerText" class="text-white/20 text-[10px] md:text-xs uppercase font-bold tracking-widest">
      Nos vemos en el Valhalla // Valkyria 2026
    </p>
  </div>
</div>
