<!-- valkyria-frontend-develop/src/app/features/purchase/purchase.html -->
<div class="min-h-screen bg-black/20 pt-28 pb-20 px-4 md:px-8">
  <div class="max-w-4xl mx-auto">

    <header class="mb-12 animate-in">
      <h1 i18n="@@purchase.title"
          class="text-3xl md:text-5xl font-black text-white uppercase tracking-tighter italic border-b-4 border-red-600 inline-block leading-none pb-2">
        Reserva tu sitio en Valhalla
      </h1>
    </header>

    @if (isLoading()) {
      <div class="flex flex-col items-center justify-center py-32">
        <div class="w-10 h-10 border-2 border-white/5 border-t-red-600 rounded-full animate-spin mb-6"></div>
        <p i18n="@@purchase.loading" class="text-[10px] uppercase tracking-[0.4em] text-white/40 animate-pulse">
          Preparando las credenciales...
        </p>
      </div>
    } @else {
      <form [formGroup]="purchaseForm" (ngSubmit)="onSubmit()" class="space-y-16">

        <!-- Sección de Entradas -->
        <section class="animate-in [animation-delay:100ms]">
          <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4 mb-8">
            <h2 i18n="@@purchase.tickets.sectionTitle"
                class="text-2xl md:text-3xl font-black text-white uppercase tracking-widest flex items-center">
              <span class="text-red-600 mr-3">//</span> Entradas
            </h2>
            <button type="button" (click)="addTicket()" i18n="@@purchase.tickets.addBtn"
                    class="w-full sm:w-auto text-[10px] font-black uppercase tracking-widest bg-white text-black px-6 py-3 hover:bg-red-600 hover:text-white transition-all cursor-pointer shadow-xl shadow-white/5">
              + Añadir Asistente
            </button>
          </div>

          <div class="space-y-6">
            @for (ticketGroup of tickets.controls; track $index) {
              <div class="relative group">
                <app-ticket-item [ticketForm]="$any(ticketGroup)"
                                 [ticketTypes]="ticketTypes"
                                 [documentTypes]="documentTypes"
                                 (remove)="removeTicket($index)">
                </app-ticket-item>
              </div>
            }
          </div>
        </section>

        <!-- Sección de Camping -->
        <section class="animate-in [animation-delay:200ms]">
          <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4 mb-8">
            <h2 i18n="@@purchase.camping.sectionTitle"
                class="text-2xl md:text-3xl font-black text-white uppercase tracking-widest flex items-center">
              <span class="text-red-600 mr-3">//</span> Camping
            </h2>
            <button type="button" (click)="addCamping()" i18n="@@purchase.camping.addBtn"
                    class="w-full sm:w-auto text-[10px] font-black uppercase tracking-widest bg-white text-black px-6 py-3 hover:bg-red-600 hover:text-white transition-all cursor-pointer shadow-xl shadow-white/5">
              + Añadir Reserva
            </button>
          </div>

          <div class="space-y-6">
            @for (campingGroup of campings.controls; track $index) {
              <div class="relative group">
                <app-camping-item [campingForm]="$any(campingGroup)"
                                  [campingTypes]="campingTypes"
                                  [documentTypes]="documentTypes"
                                  (remove)="removeCamping($index)">
                </app-camping-item>
              </div>
            }
          </div>
        </section>

        <!-- Footer del Formulario -->
        <div class="pt-10 border-t border-white/10 flex flex-col gap-6">
          <button type="submit" [disabled]="purchaseForm.invalid" i18n="@@purchase.submitBtn"
                  [ngClass]="purchaseForm.invalid ? 'opacity-20 grayscale' : 'opacity-100 hover:bg-red-600 hover:text-white'"
                  class="w-full bg-white text-black py-6 md:py-8 text-xl font-black uppercase tracking-[0.2em] transition-all cursor-pointer shadow-2xl shadow-red-600/10">
            Ir a la cesta
          </button>

          <a routerLink="/" i18n="@@purchase.backLink"
             class="text-center text-white/20 uppercase text-[10px] font-black tracking-[0.3em] hover:text-white transition-colors py-2">
            ⟨ Volver al Inicio
          </a>
        </div>
      </form>
    }
  </div>
</div>
