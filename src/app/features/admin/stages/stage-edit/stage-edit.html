<div class="p-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
  <div class="mb-6 flex items-center justify-between">
    <div>
      <a routerLink="/admin/stages"
         class="group flex items-center text-sm font-medium text-gray-500 dark:text-slate-400 hover:text-purple-600 dark:hover:text-purple-400 transition-colors mb-2">
        <svg xmlns="http://www.w3.org/2000/svg"
             class="h-4 w-4 mr-1 transform group-hover:-translate-x-1 transition-transform" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Volver al listado
      </a>
      <div class="flex items-center gap-3">
        <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">
        {{ isEditMode() ? 'Editar Escenario' : 'Nuevo Escenario' }}
      </h1>
        @if (isEditMode()) {
        <span class="px-3 py-1 bg-purple-100 dark:bg-purple-500/20 text-purple-700 dark:text-purple-400 rounded-full text-sm font-bold">#{{ stage()?.id
          }}</span>
        }
      </div>
    </div>
  </div>

  @if (isInitialLoading()) {
    <div class="flex flex-col items-center justify-center min-h-100 space-y-4">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-purple-100 border-t-purple-600"></div>
      <p class="text-gray-500 dark:text-slate-400 font-medium italic">Cargando datos del escenario...</p>
    </div>
  } @else {
    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-800 overflow-hidden">
      <div class="p-8 lg:p-12">
        <form [formGroup]="stageForm" (ngSubmit)="onSubmit()" class="space-y-8">
          <div class="space-y-6">
            <div class="flex items-center gap-3 border-b border-purple-100 dark:border-slate-700 pb-2">
              <span class="w-2 h-6 bg-purple-500 rounded-full"></span>
              <h3 class="text-xl font-bold text-gray-900 dark:text-white tracking-tight">Datos del Escenario</h3>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-slate-300 mb-2">Nombre (ES)</label>
                <input type="text" formControlName="name" placeholder="Ej: Escenario Principal..."
                       class="w-full mt-1 px-4 py-2.5 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-purple-500 focus:bg-white dark:focus:bg-slate-700 dark:text-white dark:placeholder-slate-500 transition-all outline-none">
              </div>

              <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-slate-300 mb-2">Name (EN)</label>
                <input type="text" formControlName="nameEn" placeholder="E.g. Main Stage, Techno Cave..."
                       class="w-full mt-1 px-4 py-2.5 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-purple-500 focus:bg-white dark:focus:bg-slate-700 dark:text-white dark:placeholder-slate-500 transition-all outline-none">
              </div>

              <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-slate-300 mb-2">Capacidad Máxima</label>
                <input type="number" formControlName="capacity"
                       class="w-full mt-1 px-4 py-2.5 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-purple-500 focus:bg-white dark:focus:bg-slate-700 dark:text-white transition-all">
              </div>
            </div>
          </div>

          <div class="pt-10 flex justify-end gap-4 border-t border-gray-50 dark:border-slate-800">
            <button type="button" routerLink="/admin/stages"
                    class="px-8 py-3 text-gray-500 dark:text-slate-400 font-bold hover:bg-gray-100 dark:hover:bg-slate-800 rounded-2xl transition-all cursor-pointer">
              Cancelar
            </button>
            <button type="submit" [disabled]="stageForm.invalid || isLoading()"
                    class="px-10 py-3 bg-slate-900 dark:bg-purple-600 text-white rounded-2xl font-bold hover:bg-purple-600 dark:hover:bg-purple-500 shadow-xl transition-all disabled:opacity-50 cursor-pointer flex items-center gap-2">
              @if (isLoading()) {
                <span class="w-4 h-4 border-2 border-white/20 border-t-white rounded-full animate-spin"></span>
                <span>Guardando...</span>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
                {{ isEditMode() ? 'Guardar Cambios' : 'Crear Escenario' }}
              }
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
