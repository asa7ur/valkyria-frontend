<nav class="fixed top-0 z-50 w-full bg-black/40 backdrop-blur-xl border-b border-white/5 px-4 md:px-8">
  <div class="max-w-7xl mx-auto h-20 flex justify-between items-center">

    <div class="flex-1 flex items-center">
      <a routerLink="/" (click)="closeMenu()"
         class="text-2xl font-black tracking-[0.25em] text-white hover:text-red-600 transition-all duration-300 cursor-pointer relative z-50">
        VALKYRIA
      </a>
    </div>

    <div class="hidden lg:flex items-center gap-10">
      <a routerLink="/lineup" routerLinkActive="text-red-600 !text-white"
         i18n="@@nav.lineup"
         class="text-[11px] font-bold uppercase tracking-[0.2em] text-white/60 hover:text-white transition-colors cursor-pointer">
        Lineup
      </a>
      <a routerLink="/artists" routerLinkActive="text-red-600 !text-white"
         i18n="@@nav.artists"
         class="text-[11px] font-bold uppercase tracking-[0.2em] text-white/60 hover:text-white transition-colors cursor-pointer">
        Artistas
      </a>
    </div>

    <div class="flex-1 flex items-center justify-end">

      <div class="flex items-center gap-2 md:gap-4 mr-4 md:mr-6">
        <button (click)="switchLanguage()"
                class="text-[10px] font-bold text-white/40 hover:text-white transition-colors uppercase w-8">
          {{ locale === 'es' ? 'ES' : 'EN' }}
        </button>

        <a routerLink="/purchase/checkout" class="relative p-2 text-white/70 hover:text-red-600 transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
          </svg>
          @if (cart.itemCount() > 0) {
            <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-600 rounded-full ring-2 ring-black animate-pulse"></span>
          }
        </a>
      </div>

      <div class="hidden md:block w-px h-5 bg-white/10 mr-6"></div>

      <div class="hidden md:flex items-center gap-6">
        @if (auth.currentUser()) {
          <div class="flex items-center gap-4">
            <a routerLink="/orders" class="text-[10px] font-bold uppercase tracking-widest text-white/40 hover:text-white transition-colors">
              Pedidos
            </a>
            <button (click)="onLogout()" class="text-[10px] font-bold uppercase tracking-widest text-red-500/80 hover:text-red-500 transition-colors">
              Salir
            </button>
          </div>
        } @else {
          <a routerLink="/login" class="text-[10px] font-bold uppercase tracking-widest text-white/60 hover:text-white transition-colors">
            Login
          </a>
        }

        <button routerLink="/purchase"
                class="bg-white hover:bg-red-600 text-black hover:text-white px-5 py-2.5 text-[10px] font-black uppercase tracking-[0.2em] transition-all duration-300 shadow-xl shadow-white/5">
          Tickets
        </button>
      </div>

      <button (click)="toggleMenu()"
              class="lg:hidden ml-4 text-white p-2 relative z-50 cursor-pointer"
              aria-label="Toggle menu">
        <div class="w-6 h-5 flex flex-col justify-between items-end">
          <span [class]="'h-0.5 bg-white transition-all duration-300 ' + (isMenuOpen() ? 'w-6 translate-y-2.5 -rotate-45' : 'w-6')"></span>
          <span [class]="'h-0.5 bg-white transition-all duration-300 ' + (isMenuOpen() ? 'opacity-0' : 'w-4')"></span>
          <span [class]="'h-0.5 bg-white transition-all duration-300 ' + (isMenuOpen() ? 'w-6 -translate-y-2 rotate-45' : 'w-5')"></span>
        </div>
      </button>

    </div>
  </div>
</nav>

<div
  class="fixed inset-0 bg-black/90 backdrop-blur-sm z-40 transition-opacity duration-500 lg:hidden"
  [class.opacity-100]="isMenuOpen()"
  [class.opacity-0]="!isMenuOpen()"
  [class.pointer-events-auto]="isMenuOpen()"
  [class.pointer-events-none]="!isMenuOpen()"
  (click)="closeMenu()">
</div>

<aside
  class="fixed top-0 right-0 h-full w-[85%] max-w-90 bg-neutral-950 z-50 transform transition-transform duration-500 ease-in-out lg:hidden border-l border-white/5"
  [class.translate-x-0]="isMenuOpen()"
  [class.translate-x-full]="!isMenuOpen()">

  <div class="flex flex-col h-full pt-32 pb-12 px-10">
    <div class="flex flex-col gap-8">
      <a routerLink="/lineup" (click)="closeMenu()" routerLinkActive="text-red-600"
         class="text-3xl font-black uppercase tracking-tighter text-white hover:text-red-600 transition-colors">
        Lineup
      </a>
      <a routerLink="/artists" (click)="closeMenu()" routerLinkActive="text-red-600"
         class="text-3xl font-black uppercase tracking-tighter text-white hover:text-red-600 transition-colors">
        Artistas
      </a>

      <div class="h-px bg-white/10 my-4"></div>

      <button routerLink="/purchase" (click)="closeMenu()"
              class="w-full bg-red-600 text-white py-4 text-xs font-black uppercase tracking-[0.2em]">
        Comprar Entradas
      </button>
    </div>

    <div class="mt-auto flex flex-col gap-6">
      @if (auth.currentUser()) {
        <a routerLink="/orders" (click)="closeMenu()" class="text-sm font-bold uppercase tracking-widest text-white/40">Mis Pedidos</a>
        <button (click)="onLogout()" class="text-sm font-bold uppercase tracking-widest text-red-600 text-left">Cerrar Sesión</button>
      } @else {
        <div class="flex gap-6">
          <a routerLink="/login" (click)="closeMenu()" class="text-sm font-bold uppercase tracking-widest text-white/40">Login</a>
          <a routerLink="/register" (click)="closeMenu()" class="text-sm font-bold uppercase tracking-widest text-red-600">Registro</a>
        </div>
      }

      <button (click)="switchLanguage()" class="text-[10px] font-black uppercase tracking-widest text-white/20 hover:text-white transition-colors">
        Language: {{ locale === 'es' ? 'Español' : 'English' }}
      </button>
    </div>
  </div>
</aside>
